name: Generate site

on:
  push:
    branches:
    - source

jobs:
  generate-site:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source branch
      uses: actions/checkout@v2

    - name: Install pandoc
      run: |
        cd /tmp
        curl -LO https://github.com/jgm/pandoc/releases/download/2.11.2/pandoc-2.11.2-1-amd64.deb
        sudo dpkg -i pandoc-2.11.2-1-amd64.deb

    - name: Build site
      run: |
        mkdir _site
        make

    - name: Push build output to master branch
      run: |
        git checkout --orphan build
        git rm -rf .
        mv _site/* .
        rmdir _site
        git add .
        git config user.email guillaume.edward.koenig@gmail.com
        git config user.name "Guillaume Koenig"
        git commit -m "Generated; see branch \"source\"."
        git push -f origin build:refs/heads/master
